name: preprocess_data
# Triggers a Verda batch-job that runs MEPS + ICON-EU preprocess in a
# container sized for the ICON-EU memory peak (~13 GB RSS). The real work
# happens inside the container; this workflow is a thin scheduler.
on:
  workflow_dispatch:
  schedule:
    - cron: "20 */3 * * *"

jobs:
  trigger:
    name: Trigger Verda batch job
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: POST /job
        run: |
          curl -fsSL -X POST \
            "https://tasks.datacrunch.io/${DEPLOYMENT}/job" \
            -H "Authorization: Bearer ${VERDA_INFERENCE_TOKEN}"
        env:
          DEPLOYMENT: pgweather-preprocess
          VERDA_INFERENCE_TOKEN: ${{ secrets.VERDA_INFERENCE_TOKEN }}
