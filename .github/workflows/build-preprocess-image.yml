name: build-preprocess-image
# Build and push the preprocess container image to GHCR whenever the
# preprocess code or its dependencies change. Verda's batch-job
# deployment (see ~/configs/verdacontainers/deploy_pgweather_preprocess.py)
# pulls ghcr.io/simeneide/pgweather-preprocess:latest.
on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - pyproject.toml
      - uv.lock
      - src/**
      - preprocess_forecast.py
      - preprocess_icon.py
      - db_utils.py
      - takeoff_utils.py
      - Kommuner-S.geojson
      - .github/workflows/build-preprocess-image.yml
  workflow_dispatch:

concurrency:
  group: build-preprocess-image
  cancel-in-progress: false

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pgweather-preprocess:latest
            ghcr.io/${{ github.repository_owner }}/pgweather-preprocess:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
